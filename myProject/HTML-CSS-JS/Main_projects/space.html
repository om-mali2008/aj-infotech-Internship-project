<style>
body{
    background-image: url(Mel15_anim2.gif);
    background-repeat: no-repeat;
    background-size: cover;
}

.planet{
    text-align: center;
    color: rgb(75, 80, 86);
    font-size: 30px;
    font-family: sans-serif;
    text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    border: 10px solid rgb(76, 15, 68);
   border-radius: 30px;
    box-shadow: inset;
    background: rgba(0, 0, 0, 0.5);
}


.main{
    display: flex;
    justify-content: space-around;
    align-items:flex-start;
    margin-top: 100px;
     background: rgba(152, 132, 177, 0.5);
    border: 10px solid rgb(31, 5, 5);
    box-shadow: inset;
    border-radius: 30px;
    

}





.mercury img,
.mars img,
.jupiter img,
.earth img,
.naptune img{
    width: 250px;
    height: 250px;
    border-radius: 100%;
    object-fit: cover;
    display: block;
    margin: 0 auto;
}


.main h3{
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px 15px;
    border-radius: 10px;
    text-align: center;
    width: fit-content;
    margin: 15px auto;
    font-size: 24px;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
}



</style>




<script>
  const gravityRatios = {
    mercury: 0.38,
    mars: 0.38,
    jupiter: 2.53,
    naptune: 1.14,
    earth: 1.0
  };

  document.querySelector('button').addEventListener('click', function () {
    const weightInput = document.getElementById('weight').value.trim();
    const weight = parseFloat(weightInput);

    if (!weightInput || isNaN(weight) || weight <= 0) {
      alert('Please enter a valid weight in kg!');
      return;
    }

    document.querySelector('.mercury h3').textContent =
      'Mercury: ' + (weight * gravityRatios.mercury).toFixed(2) + ' kg';

    document.querySelector('.naptune h3').textContent =
      'Neptune: ' + (weight * gravityRatios.naptune).toFixed(2) + ' kg';

    document.querySelector('.jupiter h3').textContent =
      'Jupiter: ' + (weight * gravityRatios.jupiter).toFixed(2) + ' kg';

    document.querySelector('.earth h3').textContent =
      'Earth: ' + weight.toFixed(2) + ' kg';

    // Mars fix - class typo ki wajah se querySelector kaam nahi karega
    // Isliye sab h3 tags me se Mars wala dhundho
    const allH3 = document.querySelectorAll('.main h3');
    allH3.forEach(function(h3) {
      if (h3.textContent.includes('mars')) {
        h3.textContent = 'Mars: ' + (weight * gravityRatios.mars).toFixed(2) + ' kg';
      }
    });
  });
</script>
